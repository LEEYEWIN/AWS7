<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>기본 선택자 복습</title>
	<style>
		/*
		모든 인풋 태그를 선택하는 선택자를 쓰세요. ?
		*/
		/* .input {
			border: 2px solid red;
		 } */

		 /* 
		 input 태그 중에 홀수번째 있는 요소들을 선택하는 선택자를 쓰세요
		 /* */
		 /* .input-a {
			border: 2px solid green;
		 } */ */
		/* 
		아이디가 퍼스트인 태그를 선택하는 선택자를 쓰게요ㅕ
		*/

	#first{
		background-color: aqua;
	}
		 


	</style>
</head>
<body>
	<input type="text" value="1" class = "input input-a" id = "first">
	<input type="text" value="1" class = "input input-b" >
	<input type="text" value="1" class = "input input-a">
	<input type="text" value="1" class = "input input-b">

	<!-- 모든 태그에 value 를 사용할 수 있다? 
	 -모든 태그에 벨류 속성을 쓸 수는 있지만 적용은 안 될 수도 ㅇㅇ
	-->
	<div value = "1"></div>
	
</body>
</html>
