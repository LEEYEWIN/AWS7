<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>스타일 적용 방법</title>
	<!-- 
	스타일 적용 방법 1. 태그의 style 속성을 이용
	- 우선순위가 가장 높음=> 무조건 적용
	- 해당 태그에만 적용됨

	스타일 적용 방법2. style 태그를 이용
	-head 태그에 배치
	-같은 문서에 있는 태그들을 꾸며줌
	-선택자를 이용= 원하는 태그들을 고르는 방법

	스타일 적용 방법3. link 태그를 이용 (추천)
	-이미 만들어진 스타일을 가져옴(확장자가 CSS)
	-최초 1회만 다운로드하고 이후는 캐시에서 가져다 슴
	-->

	<style>
		/*
		선택자{
			속성: 값; 속성: 값	
		}
		*/
		#name{
			color: green;
		}
		.name{
			color: blue;
		}
	</style>
	<link rel="stylesheet" href="01_스타일 적용 방법.css">
</head>
<body>
	<!-- 
	<태그 style = "속성: 값; 속성: 값">
	-->
	<div style= "color: brown"> 안녕하세욘</div>
	<div>안녕하세요</div>
	<div id = "name">홍길동</div>
	<div class="name">홍길동</div>
	<div class="name">홍길동</div>
	<div class="name1">홍길동</div>

</body>
</html>
