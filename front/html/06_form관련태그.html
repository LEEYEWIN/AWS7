<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>form관련태그</title>
</head>
<body>
	<!-- 
	input 태그
	-정보를 입력하거나 선택할 때 사용하는 태그
	-type 속성 값에 따라 종류가 달라짐
	-속성
		-type: 인풋 태그의 종류를 지정
		-text: 문자열 입력칸
		-password: 비밀번호 입력칸
		-radio: 여러개 중 하나를 선택할 때 사용, 여러 라디오의 네임을 동일하게 지정
		-checkbox: 여러개 중 여러개를 선택할 때 사용, 여러 체크박스의 네일을 동일하게 지정
		-date, datetime-local: 날짜 입력칸
		-email: 이메일 입력칸
		-tel: 전화번호 입력칸
		-file: 파일 첨부 입력칸, enctype을 설정하고, 메소드를 포스트로 설정
		-color: 색상 선택 입력칸
		-number: 숫자 입력칸	
		-button: 버튼
		-submit: 전송 버튼
		-reset: 초기화 버튼
		-IMAGE: 이미지 버튼	
	-value: 인풋 태그의 값 지정, 라디오 , 체크박스는 필수
	-readonly: 읽기 전용으로 지정=> 수정 불가, 서버에 전송
	-disabled: 비활성화 지정=> 수정 불가, 서버에 전송 X
	-placeholder: 입력칸에 안내 문구를 표시
	-required: 필수 입력칸으로 지정
	-name
		-서버에 전송할 때 변수 이름을 지정
		-name이 없으면 서버로 전송 X
		-checked: 라디오, 체크박스에 지정하면 기본 선택됨
	fieldset 태그
		-form 태그 안에서 그룹을 지정할 때 사용
		-legend 태그
		-legend 태그 안에 문구를 지정
		
	button 태그
		-속성
			-type
				-button: 일반 버튼
				-submit: 전송 버튼. 기본값
				-reset: 리셋 버튼. 같은 form태그 안에 입력된 모든 값 초기화
	label 태그
		-입력 요소를 설명하는 태그
		-for 속성을 이용하여 연관된 입력 요소를 지정
		-label 태그를 클릭하면 연관된 입력 요소를 클릭한 것과 같음

	-->
	<form action="" method = "get" entype = "multipart/form-data">
		<input type = "text" name = "name" placeholder="이름을 입력하세요" required><br>
		<input type = "password" name = "pw" placeholder="비밀번호를 입력하세요" required><br>
		<h3>성별</h3>
		<div>
		<label>
			<input type = "radio" name = "gender" value = "남자" checked>남자
		<label>
			<input type = "radio" name = "gender" value = "여자" >여자
		</label>
		</div>
			<input type = "radio" name = "gender" value = "남자" checked>남자
			<input type = "radio" name = "gender" value = "여자" >여자
		<h3>취미</h3>
		<div>
			<input type = "checkbox" name = "hobby" value = "독서" id="hobby1">
			<label for = "hobby1">독서</label> 
			<input type = "checkbox" name = "hobby" value = "게임" id="hobby2">
			<label for = "hobby2">게임</label> 
			<input type = "checkbox" name = "hobby" value = "운동" id="hobby3">
			<label for = "hobby3">운동</label> 
		</div>
			<input type = "checkbox" name = "hobby" value = "독서" >독서
			<input type = "checkbox" name = "hobby" value = "게임" >게임
			<input type = "checkbox" name = "hobby" value = "운동" >운동
		<h3>첨부 파일</h3>
			<input type = "file" name = "file" ><br>
		<h4>날짜</h4>
			<input type = "date" name = "date" >
			<input type = "button" value = "버튼">
			<input type = "submit" value = "전송">
	</form>
	<hr>
	<h3>form 예제</h3>
	<form action="">
		<fieldset>
			<legend>form 관련 태그 예제</legend>
			<h3>readonly와 disabled</h3>
			<input type="text" name="text1" value="문자열1" readonly>
			<input type="text" name="text2" value="문자열2" disabled>
		</fieldset>
		<input type = "submit" value = "전송">
	</form>
	<!-- 
	form 태그
	-정보를 서버에 전송하는 태그
	-속성
		-action: 정보를 전송할 서버 주소를 지정
		-method: 정보를 전송할 방식 지정
			-get: 기본값, URL에 정보를 추가, 전송할 주소 뒤에 ? 로 정보를 추가해서 전달 => 정보 노출
				-여러개를 전달하는 경우		 ?변수=값1&변수=값2
			-post: 헤더에 정보를 추가 => 정보 노출 X
		-enctype: 정보를 전송할 때 인코딩 방식을 지정
			-multipart/form-data: 첨부파일을 서버에 전송할 때 사용
	-->
</body>
</html>
