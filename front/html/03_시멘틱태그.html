<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>시멘틱 태그 예제</title>
</head>
<body>
	<!-- 
	p.39
	시멘틱태그
	-기능 없음(div과 동일)
	-의미를 부여할 때 사용
	-종류
		-header: 상단 콘텐츠, 문서의 머리말
		-nav: 메뉴를 그룹화, 문서의 내비게이션
		-figure: 이미지, 차트, 그림, 사진 등과 같은 콘텐츠를 그룹화
		-main: 문서의 주요 콘텐츠
		-article: 문서의 독립적인 콘텐츠
		-section: 콘텐츠의 그룹화
		-aside: 문서의 보조적인 콘텐츠
		-footer: 하단 콘텐츠
	-->
<header>
		<nav>메뉴들 배피</nav>
</header>
<main>
	<section>
		<article>콘텐츠 1</article>
		<article>콘텐츠 2</article>
		<article>콘텐츠 3</article>
	</section>
</main>
<footer>푸터</footer>
</body>
</html>
