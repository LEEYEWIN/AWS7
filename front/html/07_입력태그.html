<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>입력태그</title>
</head>
<body>
	<!-- 
	p.62
	select 태그
	-미리 지정된 값을 선택
	-option 태그와 함께 사용
	
	option 태그
	-속성
		-value : 선택했을 때 값을 지정. 생략하면 옵션 태그 안에 있는 문구가 벨류로 지정
		-select: 초기 값을 선택

	optiongroup 태그
		-option 태그들을 묶어서 보여줄 때 사용
		-속성
			-label : option 태그 묶음의 이름을 지정
	-->
		<h1>select 태그 예제</h1>
		<form action="">
			<label for="gender">성별</label>
			<select name="gender" id="gender">
				<option value="male">남성</option>
				<option selected>여성</option>
			</select>
		<h5>태어난 해</h5>
		<select name="year">
			<optgroup label="2000년대">
					<option>2025</option>
					<option>2024</option>
					<option>2023</option>
					<option>2022</option>
			</optgroup>
		</select>
		<button>전송</button>
		</form>

	<!-- 
	p. 62
	textarea 태그
	-여러 줄의 문장을 입력 시 사용
	-초기값을 벨류 속성이 아닌 태그 사이에 넣어줌
	-rows/cols 속성을 이용하여 한 행의 글자 수(열의 개수) 와 행의 개수를 지정. => 크기가 바뀜. 잘 사용 X 
	-->
	<form action="">
		<label for="content">내용</label><br>
		<textarea 
		name="content" id="content" placeholder="내용울 입력하세요"
		cols="30" rows="30">초기내용</textarea>
	<button>전송</button>
	</form>


	<!-- 
	datalist 태그
	-지정된 값들 중에서 입력을 통해 선택해서 사용
	-option태그, 인풋 태그와 함께 사용함.
	-사용방법
		-datalist 태그에 id 설정
		-input 태그에 리스트 속성을 추가. 값으로 데이터리스트 태그의 아이디값을 입력	
	-->
	<form action="">
		<h1>좋아하는 도시는?</h1>
		<input type="text" name="city" list="cities">
		<datalist id="cities">
			<option>서울</option>
			<option>울산</option>
			<option>제주도</option>
			<option>서귀포</option>
			<option>울면</option>
		</datalist>
		
	</form>
</body>
</html>
