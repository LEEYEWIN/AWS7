<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>테이블 관련 태그</title>
</head>
<body>
	<!-- 
	table 작성 시 필수 태그
	
	table 태그
		-테이블을 만들기 위한 태그

	tr 태그
	-한 행을 나타내는 캐그
	-한 행에는 여러 열 태그들이 포함

	td/th 태그
	-한 열을 나타내는 태그
	-th는 주로 첫 행에 사용되면, 가운데 정렬, 굵은 글자
	-td는 다음 속성을 이용하여 합칠 수 있음.
		-rowspan
			-행병합
		-colspan
			-열병합
		table 작성 시 선택 태그들

		thead 태그
		-테이블의 첫행
		-자식태그로 tr이 옴

		tbody 태그
		-테이블 본문
		-대부분 행들 (tr)

		tfoot 태그
		-테이블 하단
		-합계와 같이 본문과 다른 종류의 내용이 필요하면 슴

		tbody, tfoot 작성 순서과 상과넚이 화면에는 항상 티바디, 티풋 순으로보임
	-->
	<h1>테이블 태그 예제</h1>
	<table border="1">
		<tr>
			<th>과목명</th>
			<th>이름</th>
			<th>점수</th>
		</tr>
		<tr>
			<td>/HTml</td>
			<td>둘리</td>
			<td>100</td>
		</tr>	
			<td>HTML</td>
			<td>홍길동</td>
			<td>80</td>
		</tr>
		<tr>
			<td></td>
			<td>평균</td>
			<td>90</td>
		</tr>
	</THEAD>
    <title>테이블 태그 예제2</title>
</head>
<body>

<h1>테이블 태그 예제2</h1>
   <table border="1">
       <thead>
      	<tr>
          <th>과목명</th>
           <th>이름</th>
           <th>점수</th>
			  </tr> 
				</thead>
        <tfoot>
            <tr>
                <td colspan="2">평균</td>
                <td>90</td>
            </tr>
        </tfoot>
    </table>
		
</body>
</html>
