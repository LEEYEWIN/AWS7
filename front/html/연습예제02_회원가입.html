<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<!-- 회원 가입을 위한 화면을 구성하세요
	 입력 정보: 아이디, 비번, 비번확인, 이메일, 성별 -->

	<h3>회원가입을 위한 정보를 입력하세요</h3>
	<form action="" method = "get" >
		<input type = "text" name = "name" placeholder="이름을 입력하세요" required>
		<br>
		<input type = "ID" name = "ID" placeholder="아이디를 입력하세요" required>
		<br>
		<input type = "password" name = "password" placeholder="비밀번호를 입력하세요" required>
		<br>
		<input type = "repassword" name = "repaddword" placeholder="비밀번호를 다시 입력하세요" required>
		<br>
		<input type = "mail" name = "mail" placeholder="이메일을 입력하세요" required><br>
		<br>
	</form>
	<h3>성별</h3>
	<div>
		<label>
			<input type = "radio" name = "gender" value = "남자" checked>남자
		<label>
			<input type = "radio" name = "gender" value = "여자" >여자
		</label>
		<br>
		<input type = "submit" value = "제출">
	</div>
	<br>

	<div>
		<label for="password">
			<input type="password" name="비번" id="pw" placeholder="비번을 입력하세요">
		</label>
	</div>



	
</body>
</html>
